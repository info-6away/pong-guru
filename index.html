<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>pong.guru</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: "Courier New", monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 8px;
  }
  #score {
    font-size: clamp(28px, 7vw, 48px);
    letter-spacing: 8px;
    font-weight: bold;
  }
  canvas {
    background: #000;
    border: 2px solid #fff;
    aspect-ratio: 8 / 5;
    width: min(96vw, calc(74vh * 8 / 5));
    height: auto;
    touch-action: none;
    image-rendering: pixelated;
  }
  #message {
    font-size: clamp(18px, 5vw, 28px);
    min-height: 30px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .btn {
    font-family: inherit;
    font-size: 18px;
    color: #000;
    background: #fff;
    border: none;
    padding: 12px 22px;
    cursor: pointer;
    letter-spacing: 2px;
    border-radius: 4px;
    min-height: 46px;
  }
  .btn:active { background: #ccc; }
  #restart { display: none; }
  #hint { font-size: clamp(11px, 3vw, 14px); opacity: 0.5; letter-spacing: 1px; text-align: center; }

  /* gear + sound */
  #gear {
    position: fixed; top: 10px; right: 10px;
    font-size: 16px; padding: 8px 14px; z-index: 10;
  }
  #soundBtn {
    position: fixed; top: 10px; left: 10px;
    font-size: 16px; padding: 8px 14px; z-index: 10;
  }

  /* start screen */
  #start {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 30; text-align: center; padding: 20px;
  }
  #start.hidden { display: none; }
  #start h1 { font-size: clamp(44px, 13vw, 88px); letter-spacing: 8px; }
  #start .sub { font-size: clamp(16px, 5vw, 24px); letter-spacing: 3px; }
  #start .ins { opacity: 0.55; letter-spacing: 2px; font-size: clamp(13px, 4vw, 16px); }

  /* settings modal */
  #settings {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 20;
    padding: 20px;
  }
  #settings.open { display: flex; }
  #settings h2 { letter-spacing: 4px; font-size: 26px; margin-bottom: 4px; }
  .ctrl-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; width: min(92vw, 360px);
    font-size: 16px; letter-spacing: 1px;
  }
  .keybtn {
    font-family: inherit; min-width: 110px; min-height: 48px;
    font-size: 18px; color: #fff; background: #111;
    border: 2px solid #fff; border-radius: 4px; cursor: pointer;
    letter-spacing: 1px;
  }
  .keybtn.listening { background: #ffd23f; color: #000; border-color: #ffd23f; }
  #settings .row-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="score">0 : 0</div>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="message"></div>
    <button id="restart" class="btn">Restart</button>
    <div id="hint"></div>
  </div>

  <button id="soundBtn" class="btn">🔇 Sound</button>
  <button id="gear" class="btn">⚙ Settings</button>

  <div id="start">
    <h1>Pong Guru</h1>
    <div class="sub">First to 10 wins</div>
    <div class="ins">Hit the guru 🧘 for chaos</div>
    <button id="startBtn" class="btn">Start Game</button>
  </div>

  <div id="settings">
    <h2>CONTROLS</h2>
    <div class="ctrl-row"><span>Player 1 — Up</span><button class="keybtn" data-act="p1Up"></button></div>
    <div class="ctrl-row"><span>Player 1 — Down</span><button class="keybtn" data-act="p1Down"></button></div>
    <div class="ctrl-row"><span>Player 2 — Up</span><button class="keybtn" data-act="p2Up"></button></div>
    <div class="ctrl-row"><span>Player 2 — Down</span><button class="keybtn" data-act="p2Down"></button></div>
    <div class="row-actions">
      <button id="resetCtrl" class="btn">Reset to Default</button>
      <button id="closeSettings" class="btn">Done</button>
    </div>
    <div id="hint" style="opacity:.5">Click a key, then press the new key. Touch sides to play on mobile.</div>
  </div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

const PADDLE_W = 14, PADDLE_H = 90, BIG_H = 145, SMALL_H = 55;
const BALL = 13, BASE_SPEED = 6, PADDLE_SPEED = 7, WIN_SCORE = 10;
const ZEN_FACTOR = 0.45;

const left  = { x: 22,            y: H/2 - PADDLE_H/2, h: PADDLE_H };
const right = { x: W - 22 - PADDLE_W, y: H/2 - PADDLE_H/2, h: PADDLE_H };
const ball  = { x: 0, y: 0, vx: 0, vy: 0 };
let scoreL = 0, scoreR = 0;
let running = true, paused = false, started = false;
let lastToucher = null;            // 'left' | 'right'
let shakeUntil = 0;

// ---- Sound (Web Audio beeps, no files) ----
let soundOn = false, audioCtx = null;
try { soundOn = localStorage.getItem("pong.guru.sound") === "on"; } catch (e) {}

function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) {}
}
function beep(freq, dur, type = "square", gain = 0.06) {
  if (!soundOn || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  const t = audioCtx.currentTime;
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur);
}
function playPaddle() { beep(440, 0.05, "square", 0.05); }
function playScore()  { beep(150, 0.28, "triangle", 0.08); }
function playGuru() {                       // soft gong: two detuned sines, long decay
  if (!soundOn || !audioCtx) return;
  [392, 523.25].forEach(f => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    const t = audioCtx.currentTime;
    o.type = "sine"; o.frequency.value = f;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.09, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
    o.start(t); o.stop(t + 0.9);
  });
}

// ---- Controls (customizable + persisted) ----
const DEFAULTS = { p1Up: "w", p1Down: "s", p2Up: "o", p2Down: "l" };
let controls = loadControls();
const keys = {};
let capturing = null;              // data-act currently waiting for a key

function loadControls() {
  try {
    const saved = JSON.parse(localStorage.getItem("pong.guru.controls"));
    if (saved && saved.p1Up && saved.p1Down && saved.p2Up && saved.p2Down) return saved;
  } catch (e) {}
  return { ...DEFAULTS };
}
function saveControls() {
  try { localStorage.setItem("pong.guru.controls", JSON.stringify(controls)); } catch (e) {}
}
function keyLabel(k) {
  if (!k) return "—";
  if (k === " ") return "Space";
  if (k.startsWith("arrow")) return { arrowup:"↑", arrowdown:"↓", arrowleft:"←", arrowright:"→" }[k] || k;
  return k.length === 1 ? k.toUpperCase() : k.toUpperCase();
}

// ---- Guru Chaos ----
const guru = {
  x: 0, y: 0, visible: false,
  nextAppear: 0, hideAt: 0,
  msg: "", msgUntil: 0, hitAt: 0,
};
let effect = null;                 // { type, until } — only one at a time
let flashUntil = 0;
const EFFECTS = ["blessing", "curse", "karma", "zen", "flash"];
const MSG = {
  blessing: "Blessed!", curse: "Cursed!", karma: "Karma!",
  zen: "Breathe.", flash: "No ego.",
};
function randDelay() { return 10000 + Math.random() * 5000; } // 10–15s

// ---- DOM ----
const scoreEl   = document.getElementById("score");
const messageEl = document.getElementById("message");
const restartEl = document.getElementById("restart");
const hintEl    = document.querySelector("#wrap #hint");
const gearEl    = document.getElementById("gear");
const settingsEl= document.getElementById("settings");
const startEl   = document.getElementById("start");
const soundBtn  = document.getElementById("soundBtn");

restartEl.addEventListener("click", reset);
document.getElementById("startBtn").addEventListener("click", startGame);
soundBtn.addEventListener("click", () => setSound(!soundOn));
gearEl.addEventListener("click", () => openSettings(true));

function startGame() {
  ensureAudio();                          // unlock audio inside the gesture
  started = true;
  startEl.classList.add("hidden");
  guru.nextAppear = performance.now() + randDelay();
}
function setSound(on) {
  soundOn = on;
  try { localStorage.setItem("pong.guru.sound", on ? "on" : "off"); } catch (e) {}
  if (on) ensureAudio();
  updateSoundBtn();
}
function updateSoundBtn() { soundBtn.textContent = (soundOn ? "🔊" : "🔇") + " Sound"; }
document.getElementById("closeSettings").addEventListener("click", () => openSettings(false));
document.getElementById("resetCtrl").addEventListener("click", () => {
  controls = { ...DEFAULTS }; saveControls(); capturing = null; refreshKeyButtons(); updateHint();
});
document.querySelectorAll(".keybtn").forEach(b => {
  b.addEventListener("click", () => {
    capturing = b.dataset.act;
    refreshKeyButtons();
  });
});

function openSettings(open) {
  settingsEl.classList.toggle("open", open);
  paused = open;
  capturing = null;
  if (open) refreshKeyButtons();
}
function refreshKeyButtons() {
  document.querySelectorAll(".keybtn").forEach(b => {
    const act = b.dataset.act;
    b.textContent = capturing === act ? "press a key…" : keyLabel(controls[act]);
    b.classList.toggle("listening", capturing === act);
  });
}
function updateHint() {
  hintEl.textContent =
    "P1 " + keyLabel(controls.p1Up) + "/" + keyLabel(controls.p1Down) +
    "   •   P2 " + keyLabel(controls.p2Up) + "/" + keyLabel(controls.p2Down) +
    "   •   Mobile: touch each side  (landscape recommended)";
}

// ---- Input ----
addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if (capturing) {                 // remapping a control
    e.preventDefault();
    // avoid assigning the same key to two actions
    for (const a in controls) if (controls[a] === k) controls[a] = null;
    controls[capturing] = k;
    capturing = null;
    saveControls(); refreshKeyButtons(); updateHint();
    return;
  }
  keys[k] = true;
});
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

// Touch: left half -> P1, right half -> P2, drag to position paddle
function handleTouch(e) {
  if (paused) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleY = H / rect.height;
  for (const t of e.touches) {
    const y = (t.clientY - rect.top) * scaleY;
    const p = (t.clientX - rect.left) < rect.width / 2 ? left : right;
    p.y = Math.max(0, Math.min(H - p.h, y - p.h / 2));
  }
}
canvas.addEventListener("touchstart", handleTouch, { passive: false });
canvas.addEventListener("touchmove",  handleTouch, { passive: false });

// ---- Game logic ----
function resetBall(dir) {
  ball.x = W/2 - BALL/2;
  ball.y = H/2 - BALL/2;
  const angle = (Math.random() * 0.5 - 0.25) * Math.PI;
  ball.vx = Math.cos(angle) * BASE_SPEED * dir;
  ball.vy = Math.sin(angle) * BASE_SPEED;
}

function reset() {
  scoreL = 0; scoreR = 0;
  running = true;
  lastToucher = null;
  messageEl.textContent = "";
  restartEl.style.display = "none";
  left.y = right.y = H/2 - PADDLE_H/2;
  left.h = right.h = PADDLE_H;
  effect = null; flashUntil = 0;
  guru.visible = false; guru.msgUntil = 0;
  guru.nextAppear = performance.now() + randDelay();
  resetBall(Math.random() < 0.5 ? -1 : 1);
  updateScore();
}

function updateScore() { scoreEl.textContent = scoreL + " : " + scoreR; }

function hitsPaddle(p) {
  return ball.x < p.x + PADDLE_W && ball.x + BALL > p.x &&
         ball.y < p.y + p.h     && ball.y + BALL > p.y;
}

function bounce(p, side) {
  ball.vx *= -1;
  const offset = (ball.y + BALL/2) - (p.y + p.h/2);
  ball.vy += (offset / (p.h/2)) * 3;
  ball.vx *= 1.05;
  ball.vx = Math.max(-13, Math.min(13, ball.vx));
  lastToucher = side;
  playPaddle();
}

// ---- Guru effects ----
function toucherPaddle()  { return lastToucher === "right" ? right : left; }
function opponentPaddle() { return lastToucher === "left"  ? right : left; }

function applyEffect(now) {
  const type = EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
  let until = now;
  if (type === "blessing") { toucherPaddle().h = BIG_H;   until = now + 5000; }
  else if (type === "curse") { opponentPaddle().h = SMALL_H; until = now + 5000; }
  else if (type === "karma") { until = now + 4000; }
  else if (type === "zen")   { ball.vx *= ZEN_FACTOR; ball.vy *= ZEN_FACTOR; until = now + 3000; }
  else if (type === "flash") { flashUntil = now + 1000; until = now + 1000; }
  effect = { type, until };
  guru.msg = MSG[type];
  guru.msgUntil = now + 1200;
}

function clearEffect() {
  if (!effect) return;
  if (effect.type === "zen") { ball.vx /= ZEN_FACTOR; ball.vy /= ZEN_FACTOR; }
  left.h = right.h = PADDLE_H;     // safe: only one effect runs at a time
  // keep paddles inside bounds after resize
  left.y  = Math.min(left.y,  H - left.h);
  right.y = Math.min(right.y, H - right.h);
  effect = null;
}

function update(now) {
  if (!started || paused || !running) return;

  if (effect && now >= effect.until) clearEffect();

  // Guru schedule
  if (!guru.visible && now >= guru.nextAppear) {
    guru.visible = true;
    guru.x = W/2 + (Math.random() * 100 - 50);
    guru.y = 120 + Math.random() * (H - 240);
    guru.hideAt = now + 3500;
  }
  if (guru.visible && now >= guru.hideAt) {
    guru.visible = false;
    guru.nextAppear = now + randDelay();
  }

  // Keyboard movement
  if (keys[controls.p1Up])   left.y  -= PADDLE_SPEED;
  if (keys[controls.p1Down]) left.y  += PADDLE_SPEED;
  if (keys[controls.p2Up])   right.y -= PADDLE_SPEED;
  if (keys[controls.p2Down]) right.y += PADDLE_SPEED;
  left.y  = Math.max(0, Math.min(H - left.h,  left.y));
  right.y = Math.max(0, Math.min(H - right.h, right.y));

  // Ball
  ball.x += ball.vx;
  ball.y += ball.vy;
  if (effect && effect.type === "karma") ball.vy += (Math.random() - 0.5) * 1.4; // gentle wobble

  // Walls
  if (ball.y <= 0) { ball.y = 0; ball.vy = Math.abs(ball.vy); }
  if (ball.y + BALL >= H) { ball.y = H - BALL; ball.vy = -Math.abs(ball.vy); }

  // Paddles
  if (ball.vx < 0 && hitsPaddle(left))  { ball.x = left.x + PADDLE_W; bounce(left, "left"); }
  else if (ball.vx > 0 && hitsPaddle(right)) { ball.x = right.x - BALL; bounce(right, "right"); }

  // Guru collision -> one effect at a time
  if (guru.visible && !effect) {
    const bx = ball.x + BALL/2, by = ball.y + BALL/2;
    if (Math.abs(bx - guru.x) < 28 && Math.abs(by - guru.y) < 28) {
      guru.hitAt = now;
      guru.visible = false;
      guru.nextAppear = now + randDelay();
      shakeUntil = now + 300;            // small screen shake on chaos
      applyEffect(now);
      playGuru();
    }
  }

  // Scoring
  if (ball.x + BALL < 0) { scoreR++; afterScore(1); }
  else if (ball.x > W)   { scoreL++; afterScore(-1); }
}

function afterScore(dir) {
  updateScore();
  playScore();
  if (scoreL >= WIN_SCORE || scoreR >= WIN_SCORE) {
    running = false;
    if (effect) clearEffect();
    messageEl.textContent = (scoreL >= WIN_SCORE ? "Player 1" : "Player 2") + " wins!";
    restartEl.style.display = "inline-block";
  } else {
    resetBall(dir);
  }
}

// ---- Render ----
function draw(now) {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  // small screen shake while Guru Chaos triggers
  let sx = 0, sy = 0;
  if (shakeUntil > now) {
    const m = 4 * ((shakeUntil - now) / 300);
    sx = (Math.random() * 2 - 1) * m;
    sy = (Math.random() * 2 - 1) * m;
  }
  ctx.save();
  ctx.translate(sx, sy);

  // center line
  ctx.fillStyle = "#fff";
  for (let y = 0; y < H; y += 30) ctx.fillRect(W/2 - 1, y, 2, 16);

  // side hints (faint) for touch
  ctx.globalAlpha = 0.18;
  ctx.font = "16px 'Courier New', monospace";
  ctx.textBaseline = "top";
  ctx.textAlign = "left";  ctx.fillText("P1", 10, 8);
  ctx.textAlign = "right"; ctx.fillText("P2", W - 10, 8);
  ctx.globalAlpha = 1;

  // paddles
  ctx.fillRect(left.x,  left.y,  PADDLE_W, left.h);
  ctx.fillRect(right.x, right.y, PADDLE_W, right.h);

  // ball (tinted while an effect is live)
  if (running) {
    ctx.fillStyle = effect ? "#ffd23f" : "#fff";
    ctx.fillRect(ball.x, ball.y, BALL, BALL);
    ctx.fillStyle = "#fff";
  }

  // guru
  if (guru.visible) {
    const bob = Math.sin(now / 200) * 4;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "40px serif";
    ctx.fillText("🧘", guru.x, guru.y + bob);
  }

  // wise message
  if (guru.msgUntil > now) {
    const a = Math.min(1, (guru.msgUntil - now) / 1200);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = "#ffd23f";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "22px 'Courier New', monospace";
    ctx.fillText(guru.msg, W/2, 40);
    ctx.restore();
  }

  ctx.restore();  // end screen-shake transform

  // enlightenment flash
  if (flashUntil > now) {
    ctx.save();
    ctx.globalAlpha = 0.5 * (flashUntil - now) / 1000;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function loop(now) {
  update(now);
  draw(now);
  requestAnimationFrame(loop);
}

refreshKeyButtons();
updateHint();
updateSoundBtn();
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
