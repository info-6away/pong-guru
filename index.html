<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>pong.guru</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: "Courier New", monospace;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  #wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 8px;
  }
  #score {
    font-size: clamp(24px, 7vw, 48px);
    letter-spacing: 8px;
    font-weight: bold;
    flex: 0 0 auto;
  }
  /* flexible middle region: grid holding [padL] [stage] [padR] (pads off on desktop) */
  #play {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr;
    grid-template-areas: "stage";
    place-items: center;
    gap: 8px;
  }
  #stage {
    grid-area: stage;
    width: 100%;
    height: 100%;
    min-width: 0;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    background: #000;
    border: 2px solid #fff;
    /* JS (fitCanvas) sets explicit px size to fit #stage at the 800x500 ratio;
       element box == rendered size, so getBoundingClientRect stays exact for touch */
    touch-action: none;
    image-rendering: pixelated;
  }
  /* touch control zones — subtle, hidden on desktop */
  .pad {
    display: none;
    box-sizing: border-box;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border: 2px solid rgba(255,255,255,0.22);
    border-radius: 10px;
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.42);
    font-size: 18px;
    letter-spacing: 2px;
    touch-action: none;
    user-select: none;
  }
  .pad .arrow { font-size: 24px; opacity: 0.55; }
  #padL { grid-area: padL; }
  #padR { grid-area: padR; }

  /* landscape mobile: pads beside the canvas */
  body.touch.landscape #play {
    grid-template-columns: auto 1fr auto;
    grid-template-areas: "padL stage padR";
  }
  body.touch.landscape .pad { display: flex; width: clamp(54px, 13vw, 120px); height: 100%; }

  /* portrait mobile: pads below the canvas, side by side */
  body.touch.portrait #play {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr auto;
    grid-template-areas:
      "stage stage"
      "padL  padR";
  }
  body.touch.portrait .pad { display: flex; width: 100%; height: clamp(110px, 20vh, 200px); }
  #bottom {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  #message {
    font-size: clamp(16px, 5vw, 28px);
    min-height: 26px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .btn {
    font-family: inherit;
    font-size: 18px;
    color: #000;
    background: #fff;
    border: none;
    padding: 12px 22px;
    cursor: pointer;
    letter-spacing: 2px;
    border-radius: 4px;
    min-height: 46px;
  }
  .btn:active { background: #ccc; }
  #restart { display: none; }
  #hint { font-size: clamp(11px, 3vw, 14px); opacity: 0.5; letter-spacing: 1px; text-align: center; }
  #rotateHint {
    display: none;
    color: #ffd23f;
    font-size: clamp(12px, 3.5vw, 15px);
    letter-spacing: 1px;
    text-align: center;
  }
  /* portrait on a touch device -> show rotate hint */
  body.touch.portrait #rotateHint { display: block; }
  /* landscape on a touch device -> reclaim vertical space for the canvas */
  body.touch.landscape #score { font-size: clamp(20px, 5vh, 34px); }
  body.touch.landscape #hint  { display: none; }
  body.touch.landscape #wrap  { gap: 4px; padding: 4px; }

  /* fullscreen button — only on touch devices */
  #fsBtn {
    display: none;
    position: fixed; bottom: 10px; left: 10px;
    font-size: 14px; padding: 8px 12px; z-index: 10;
  }
  body.touch #fsBtn { display: block; }

  /* gear + sound */
  #gear {
    position: fixed; top: 10px; right: 10px;
    font-size: 16px; padding: 8px 14px; z-index: 10;
  }
  #soundBtn {
    position: fixed; top: 10px; left: 10px;
    font-size: 16px; padding: 8px 14px; z-index: 10;
  }

  /* start screen */
  #start {
    position: fixed; inset: 0; background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; z-index: 30; text-align: center; padding: 20px;
  }
  #start.hidden { display: none; }
  #start #logo {
    width: clamp(180px, 50vw, 320px);
    height: auto;
    image-rendering: auto;
    filter: drop-shadow(0 0 18px rgba(255,210,63,0.4));
  }
  /* compact the start screen on short landscape phones so it never clips */
  body.touch.landscape #start { gap: 8px; }
  body.touch.landscape #start #logo { width: clamp(110px, 34vh, 200px); }
  #start .sub { font-size: clamp(16px, 5vw, 24px); letter-spacing: 3px; }
  #start .ins { opacity: 0.55; letter-spacing: 2px; font-size: clamp(13px, 4vw, 16px); }

  /* settings modal */
  #settings {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 20;
    padding: 20px;
  }
  #settings.open { display: flex; }
  #settings h2 { letter-spacing: 4px; font-size: 26px; margin-bottom: 4px; }
  .ctrl-row {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; width: min(92vw, 360px);
    font-size: 16px; letter-spacing: 1px;
  }
  .keybtn {
    font-family: inherit; min-width: 110px; min-height: 48px;
    font-size: 18px; color: #fff; background: #111;
    border: 2px solid #fff; border-radius: 4px; cursor: pointer;
    letter-spacing: 1px;
  }
  .keybtn.listening { background: #ffd23f; color: #000; border-color: #ffd23f; }
  .seg { display: flex; gap: 8px; }
  .seg button {
    font-family: inherit; min-width: 46px; min-height: 46px;
    font-size: 17px; color: #fff; background: #111;
    border: 2px solid #fff; border-radius: 4px; cursor: pointer;
  }
  .seg button.active { background: #ffd23f; color: #000; border-color: #ffd23f; }
  .helper { opacity: 0.5; font-size: 13px; letter-spacing: 1px; }
  #settings .row-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
</style>
</head>
<body>
  <div id="wrap">
    <div id="score">0 : 0</div>
    <div id="play">
      <div id="padL" class="pad"><span>P1</span><span class="arrow">↕</span></div>
      <div id="stage"><canvas id="game" width="800" height="500"></canvas></div>
      <div id="padR" class="pad"><span>P2</span><span class="arrow">↕</span></div>
    </div>
    <div id="bottom">
      <div id="rotateHint">Rotate phone for best play</div>
      <div id="message"></div>
      <button id="restart" class="btn">Restart</button>
      <div id="hint"></div>
    </div>
  </div>

  <button id="soundBtn" class="btn">🔇 Sound</button>
  <button id="gear" class="btn">⚙ Settings</button>
  <button id="fsBtn" class="btn">⛶ Fullscreen</button>

  <div id="start">
    <img id="logo" src="logos/transparentponglogo-512.png" alt="Pong Guru logo">
    <div class="sub">First to 10 wins</div>
    <div class="ins">Hit the guru 🧘 for chaos</div>
    <button id="startBtn" class="btn">Start Game</button>
  </div>

  <div id="settings">
    <h2>CONTROLS</h2>
    <div class="ctrl-row"><span>Player 1 — Up</span><button class="keybtn" data-act="p1Up"></button></div>
    <div class="ctrl-row"><span>Player 1 — Down</span><button class="keybtn" data-act="p1Down"></button></div>
    <div class="ctrl-row"><span>Player 2 — Up</span><button class="keybtn" data-act="p2Up"></button></div>
    <div class="ctrl-row"><span>Player 2 — Down</span><button class="keybtn" data-act="p2Down"></button></div>
    <div class="ctrl-row"><span>Guru Count</span>
      <div id="guruSeg" class="seg">
        <button data-n="1">1</button>
        <button data-n="2">2</button>
        <button data-n="3">3</button>
        <button data-n="5">5</button>
      </div>
    </div>
    <div class="helper">More gurus = more chaos</div>
    <div class="row-actions">
      <button id="resetCtrl" class="btn">Reset to Default</button>
      <button id="closeSettings" class="btn">Done</button>
    </div>
    <div id="hint" style="opacity:.5">Click a key, then press the new key. Touch sides to play on mobile.</div>
  </div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

const PADDLE_W = 14, PADDLE_H = 90, BIG_H = 145, SMALL_H = 55;
const BALL = 13, BASE_SPEED = 6, PADDLE_SPEED = 7, WIN_SCORE = 10;
const ZEN_FACTOR = 0.45;

const left  = { x: 22,            y: H/2 - PADDLE_H/2, h: PADDLE_H };
const right = { x: W - 22 - PADDLE_W, y: H/2 - PADDLE_H/2, h: PADDLE_H };
const ball  = { x: 0, y: 0, vx: 0, vy: 0 };
let scoreL = 0, scoreR = 0;
let running = true, paused = false, started = false;
let lastToucher = null;            // 'left' | 'right'
let shakeUntil = 0;

// ---- Sound (Web Audio beeps, no files) ----
let soundOn = false, audioCtx = null;
try { soundOn = localStorage.getItem("pong.guru.sound") === "on"; } catch (e) {}

function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
  } catch (e) {}
}
function beep(freq, dur, type = "square", gain = 0.06) {
  if (!soundOn || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  const t = audioCtx.currentTime;
  o.type = type; o.frequency.value = freq;
  o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur);
}
function playPaddle() { beep(440, 0.05, "square", 0.05); }
function playScore()  { beep(150, 0.28, "triangle", 0.08); }
function playGuru() {                       // soft gong: two detuned sines, long decay
  if (!soundOn || !audioCtx) return;
  [392, 523.25].forEach(f => {
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    const t = audioCtx.currentTime;
    o.type = "sine"; o.frequency.value = f;
    o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.09, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.9);
    o.start(t); o.stop(t + 0.9);
  });
}

// ---- Controls (customizable + persisted) ----
const DEFAULTS = { p1Up: "w", p1Down: "s", p2Up: "o", p2Down: "l" };
let controls = loadControls();
const keys = {};
let capturing = null;              // data-act currently waiting for a key

function loadControls() {
  try {
    const saved = JSON.parse(localStorage.getItem("pong.guru.controls"));
    if (saved && saved.p1Up && saved.p1Down && saved.p2Up && saved.p2Down) return saved;
  } catch (e) {}
  return { ...DEFAULTS };
}
function saveControls() {
  try { localStorage.setItem("pong.guru.controls", JSON.stringify(controls)); } catch (e) {}
}
function keyLabel(k) {
  if (!k) return "—";
  if (k === " ") return "Space";
  if (k.startsWith("arrow")) return { arrowup:"↑", arrowdown:"↓", arrowleft:"←", arrowright:"→" }[k] || k;
  return k.length === 1 ? k.toUpperCase() : k.toUpperCase();
}

// ---- Guru Chaos ----
const chaos = { active: false, nextAppear: 0, hideAt: 0, msg: "", msgUntil: 0 };
let gurus = [];                    // [{x,y}] currently-visible gurus (share one window)
const GURU_R = 28;                 // half hit-box

let guruCount = loadGuruCount();
function loadGuruCount() {
  try {
    const n = parseInt(localStorage.getItem("pong.guru.count"), 10);
    if ([1, 2, 3, 5].includes(n)) return n;
  } catch (e) {}
  return 3;                        // default
}
function saveGuruCount() {
  try { localStorage.setItem("pong.guru.count", String(guruCount)); } catch (e) {}
}

// Place gurus in the middle third, away from paddles, off the ball, no overlap
function spawnGurus(now) {
  gurus = [];
  const minDist = 66, bx = ball.x + BALL/2, by = ball.y + BALL/2;
  let tries = 0;
  while (gurus.length < guruCount && tries < 400) {
    tries++;
    const x = W * 0.30 + Math.random() * W * 0.40;
    const y = 110 + Math.random() * (H - 220);
    if (Math.hypot(x - bx, y - by) < 80) continue;                       // not on the ball
    if (gurus.some(g => Math.hypot(x - g.x, y - g.y) < minDist)) continue; // no overlap
    gurus.push({ x, y });
  }
  chaos.active = true;
  chaos.hideAt = now + 3500;
}

let effect = null;                 // { type, until } — only one at a time
let flashUntil = 0;
const EFFECTS = ["blessing", "curse", "karma", "zen", "flash"];
const MSG = {
  blessing: "Blessed!", curse: "Cursed!", karma: "Karma!",
  zen: "Breathe.", flash: "No ego.",
};
function randDelay() { return 10000 + Math.random() * 5000; } // 10–15s

// ---- DOM ----
const scoreEl   = document.getElementById("score");
const messageEl = document.getElementById("message");
const restartEl = document.getElementById("restart");
const hintEl    = document.querySelector("#wrap #hint");
const gearEl    = document.getElementById("gear");
const settingsEl= document.getElementById("settings");
const startEl   = document.getElementById("start");
const soundBtn  = document.getElementById("soundBtn");

restartEl.addEventListener("click", reset);
document.getElementById("startBtn").addEventListener("click", startGame);
soundBtn.addEventListener("click", () => setSound(!soundOn));
gearEl.addEventListener("click", () => openSettings(true));

function startGame() {
  ensureAudio();                          // unlock audio inside the gesture
  started = true;
  startEl.classList.add("hidden");
  chaos.nextAppear = performance.now() + randDelay();
}
function setSound(on) {
  soundOn = on;
  try { localStorage.setItem("pong.guru.sound", on ? "on" : "off"); } catch (e) {}
  if (on) ensureAudio();
  updateSoundBtn();
}
function updateSoundBtn() { soundBtn.textContent = (soundOn ? "🔊" : "🔇") + " Sound"; }
document.getElementById("closeSettings").addEventListener("click", () => openSettings(false));
document.getElementById("resetCtrl").addEventListener("click", () => {
  controls = { ...DEFAULTS }; saveControls(); capturing = null; refreshKeyButtons(); updateHint();
});
document.querySelectorAll(".keybtn").forEach(b => {
  b.addEventListener("click", () => {
    capturing = b.dataset.act;
    refreshKeyButtons();
  });
});
document.querySelectorAll("#guruSeg button").forEach(b => {
  b.addEventListener("click", () => {
    guruCount = parseInt(b.dataset.n, 10);
    saveGuruCount();
    refreshGuruSeg();
  });
});
function refreshGuruSeg() {
  document.querySelectorAll("#guruSeg button").forEach(b => {
    b.classList.toggle("active", parseInt(b.dataset.n, 10) === guruCount);
  });
}

function openSettings(open) {
  settingsEl.classList.toggle("open", open);
  paused = open;
  capturing = null;
  if (open) { refreshKeyButtons(); refreshGuruSeg(); }
}
function refreshKeyButtons() {
  document.querySelectorAll(".keybtn").forEach(b => {
    const act = b.dataset.act;
    b.textContent = capturing === act ? "press a key…" : keyLabel(controls[act]);
    b.classList.toggle("listening", capturing === act);
  });
}
function updateHint() {
  hintEl.textContent =
    "P1 " + keyLabel(controls.p1Up) + "/" + keyLabel(controls.p1Down) +
    "   •   P2 " + keyLabel(controls.p2Up) + "/" + keyLabel(controls.p2Down) +
    "   •   Mobile: touch each side  (landscape recommended)";
}

// ---- Input ----
addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if (capturing) {                 // remapping a control
    e.preventDefault();
    // avoid assigning the same key to two actions
    for (const a in controls) if (controls[a] === k) controls[a] = null;
    controls[capturing] = k;
    capturing = null;
    saveControls(); refreshKeyButtons(); updateHint();
    return;
  }
  keys[k] = true;
});
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });

// Touch: dedicated P1/P2 zones outside the canvas (canvas halves are a fallback).
// Maps each finger's Y within its zone to that paddle. Multi-touch works because
// e.touches holds every active finger; rects come from getBoundingClientRect (live).
const padLEl = document.getElementById("padL");
const padREl = document.getElementById("padR");
function inRect(r, t) {
  return t.clientX >= r.left && t.clientX <= r.right &&
         t.clientY >= r.top  && t.clientY <= r.bottom;
}
function visibleRect(el) {           // null if hidden (display:none -> offsetParent null)
  return el.offsetParent ? el.getBoundingClientRect() : null;
}
function moveTo(p, clientY, rect) {
  const y = (clientY - rect.top) * (H / rect.height);
  p.y = Math.max(0, Math.min(H - p.h, y - p.h / 2));
}
function handleTouch(e) {
  if (paused) return;
  const rl = visibleRect(padLEl), rr = visibleRect(padREl);
  const rc = canvas.getBoundingClientRect();
  let used = false;
  for (const t of e.touches) {
    if (rl && inRect(rl, t))      { moveTo(left,  t.clientY, rl); used = true; }
    else if (rr && inRect(rr, t)) { moveTo(right, t.clientY, rr); used = true; }
    else if (inRect(rc, t)) {       // fallback: touch directly on the canvas
      moveTo((t.clientX - rc.left) < rc.width / 2 ? left : right, t.clientY, rc);
      used = true;
    }
  }
  if (used) e.preventDefault();      // block scroll/zoom only when controlling a paddle
}
const playEl = document.getElementById("play");
playEl.addEventListener("touchstart", handleTouch, { passive: false });
playEl.addEventListener("touchmove",  handleTouch, { passive: false });

// ---- Game logic ----
function resetBall(dir) {
  ball.x = W/2 - BALL/2;
  ball.y = H/2 - BALL/2;
  const angle = (Math.random() * 0.5 - 0.25) * Math.PI;
  ball.vx = Math.cos(angle) * BASE_SPEED * dir;
  ball.vy = Math.sin(angle) * BASE_SPEED;
}

function reset() {
  scoreL = 0; scoreR = 0;
  running = true;
  lastToucher = null;
  messageEl.textContent = "";
  restartEl.style.display = "none";
  left.y = right.y = H/2 - PADDLE_H/2;
  left.h = right.h = PADDLE_H;
  effect = null; flashUntil = 0;
  chaos.active = false; chaos.msgUntil = 0; gurus = [];
  chaos.nextAppear = performance.now() + randDelay();
  resetBall(Math.random() < 0.5 ? -1 : 1);
  updateScore();
}

function updateScore() { scoreEl.textContent = scoreL + " : " + scoreR; }

function hitsPaddle(p) {
  return ball.x < p.x + PADDLE_W && ball.x + BALL > p.x &&
         ball.y < p.y + p.h     && ball.y + BALL > p.y;
}

function bounce(p, side) {
  ball.vx *= -1;
  const offset = (ball.y + BALL/2) - (p.y + p.h/2);
  ball.vy += (offset / (p.h/2)) * 3;
  ball.vx *= 1.05;
  ball.vx = Math.max(-13, Math.min(13, ball.vx));
  lastToucher = side;
  playPaddle();
}

// ---- Guru effects ----
function toucherPaddle()  { return lastToucher === "right" ? right : left; }
function opponentPaddle() { return lastToucher === "left"  ? right : left; }

function applyEffect(now) {
  const type = EFFECTS[Math.floor(Math.random() * EFFECTS.length)];
  let until = now;
  if (type === "blessing") { toucherPaddle().h = BIG_H;   until = now + 5000; }
  else if (type === "curse") { opponentPaddle().h = SMALL_H; until = now + 5000; }
  else if (type === "karma") { until = now + 4000; }
  else if (type === "zen")   { ball.vx *= ZEN_FACTOR; ball.vy *= ZEN_FACTOR; until = now + 3000; }
  else if (type === "flash") { flashUntil = now + 1000; until = now + 1000; }
  effect = { type, until };
  chaos.msg = MSG[type];
  chaos.msgUntil = now + 1200;
}

function clearEffect() {
  if (!effect) return;
  if (effect.type === "zen") { ball.vx /= ZEN_FACTOR; ball.vy /= ZEN_FACTOR; }
  left.h = right.h = PADDLE_H;     // safe: only one effect runs at a time
  // keep paddles inside bounds after resize
  left.y  = Math.min(left.y,  H - left.h);
  right.y = Math.min(right.y, H - right.h);
  effect = null;
}

function update(now) {
  if (!started || paused || !running) return;

  if (effect && now >= effect.until) clearEffect();

  // Guru chaos appear / disappear (all gurus share one window)
  if (!chaos.active && now >= chaos.nextAppear) spawnGurus(now);
  if (chaos.active && now >= chaos.hideAt) {
    chaos.active = false; gurus = [];
    chaos.nextAppear = now + randDelay();
  }

  // Keyboard movement
  if (keys[controls.p1Up])   left.y  -= PADDLE_SPEED;
  if (keys[controls.p1Down]) left.y  += PADDLE_SPEED;
  if (keys[controls.p2Up])   right.y -= PADDLE_SPEED;
  if (keys[controls.p2Down]) right.y += PADDLE_SPEED;
  left.y  = Math.max(0, Math.min(H - left.h,  left.y));
  right.y = Math.max(0, Math.min(H - right.h, right.y));

  // Ball
  ball.x += ball.vx;
  ball.y += ball.vy;
  if (effect && effect.type === "karma") ball.vy += (Math.random() - 0.5) * 1.4; // gentle wobble

  // Walls
  if (ball.y <= 0) { ball.y = 0; ball.vy = Math.abs(ball.vy); }
  if (ball.y + BALL >= H) { ball.y = H - BALL; ball.vy = -Math.abs(ball.vy); }

  // Paddles
  if (ball.vx < 0 && hitsPaddle(left))  { ball.x = left.x + PADDLE_W; bounce(left, "left"); }
  else if (ball.vx > 0 && hitsPaddle(right)) { ball.x = right.x - BALL; bounce(right, "right"); }

  // Guru collision -> one effect; remove ALL gurus, start cooldown
  if (chaos.active && !effect) {
    const bx = ball.x + BALL/2, by = ball.y + BALL/2;
    if (gurus.some(g => Math.abs(bx - g.x) < GURU_R && Math.abs(by - g.y) < GURU_R)) {
      chaos.active = false; gurus = [];
      chaos.nextAppear = now + randDelay();
      shakeUntil = now + 300;            // small screen shake on chaos
      applyEffect(now);
      playGuru();
    }
  }

  // Scoring
  if (ball.x + BALL < 0) { scoreR++; afterScore(1); }
  else if (ball.x > W)   { scoreL++; afterScore(-1); }
}

function afterScore(dir) {
  updateScore();
  playScore();
  if (scoreL >= WIN_SCORE || scoreR >= WIN_SCORE) {
    running = false;
    if (effect) clearEffect();
    messageEl.textContent = (scoreL >= WIN_SCORE ? "Player 1" : "Player 2") + " wins!";
    restartEl.style.display = "inline-block";
  } else {
    resetBall(dir);
  }
}

// ---- Render ----
function draw(now) {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  // small screen shake while Guru Chaos triggers
  let sx = 0, sy = 0;
  if (shakeUntil > now) {
    const m = 4 * ((shakeUntil - now) / 300);
    sx = (Math.random() * 2 - 1) * m;
    sy = (Math.random() * 2 - 1) * m;
  }
  ctx.save();
  ctx.translate(sx, sy);

  // center line
  ctx.fillStyle = "#fff";
  for (let y = 0; y < H; y += 30) ctx.fillRect(W/2 - 1, y, 2, 16);

  // side hints (faint) for touch
  ctx.globalAlpha = 0.18;
  ctx.font = "16px 'Courier New', monospace";
  ctx.textBaseline = "top";
  ctx.textAlign = "left";  ctx.fillText("P1", 10, 8);
  ctx.textAlign = "right"; ctx.fillText("P2", W - 10, 8);
  ctx.globalAlpha = 1;

  // paddles
  ctx.fillRect(left.x,  left.y,  PADDLE_W, left.h);
  ctx.fillRect(right.x, right.y, PADDLE_W, right.h);

  // ball (tinted while an effect is live)
  if (running) {
    ctx.fillStyle = effect ? "#ffd23f" : "#fff";
    ctx.fillRect(ball.x, ball.y, BALL, BALL);
    ctx.fillStyle = "#fff";
  }

  // pre-spawn cue: subtle glow + "Guru incoming..." ~1s before gurus appear
  if (started && running && !chaos.active) {
    const lead = chaos.nextAppear - now;
    if (lead > 0 && lead < 1000) {
      const a = Math.sin((1 - lead / 1000) * Math.PI);   // smooth fade in/out
      ctx.save();
      const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 170);
      grad.addColorStop(0, "rgba(255,210,63," + (0.16 * a).toFixed(3) + ")");
      grad.addColorStop(1, "rgba(255,210,63,0)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 0.8 * a;
      ctx.fillStyle = "#ffd23f";
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.font = "18px 'Courier New', monospace";
      ctx.fillText("Guru incoming...", W/2, H/2);
      ctx.restore();
    }
  }

  // gurus
  if (chaos.active) {
    const bob = Math.sin(now / 200) * 4;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "38px serif";
    for (const g of gurus) ctx.fillText("🧘", g.x, g.y + bob);
  }

  // wise message
  if (chaos.msgUntil > now) {
    const a = Math.min(1, (chaos.msgUntil - now) / 1200);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = "#ffd23f";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.font = "22px 'Courier New', monospace";
    ctx.fillText(chaos.msg, W/2, 40);
    ctx.restore();
  }

  ctx.restore();  // end screen-shake transform

  // enlightenment flash
  if (flashUntil > now) {
    ctx.save();
    ctx.globalAlpha = 0.5 * (flashUntil - now) / 1000;
    ctx.fillStyle = "#fff";
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
}

function loop(now) {
  update(now);
  draw(now);
  requestAnimationFrame(loop);
}

// ---- Orientation / layout ----
const isTouch = !!(window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
document.body.classList.toggle("touch", isTouch);

const stageEl = document.getElementById("stage");

// Fit the canvas to #stage preserving the 800x500 ratio.
// Element box == rendered size, so getBoundingClientRect stays exact for touch.
function fitCanvas() {
  const sw = stageEl.clientWidth, sh = stageEl.clientHeight;
  if (sw <= 0 || sh <= 0) return;
  const ratio = W / H;
  let cw = sw, ch = sw / ratio;
  if (ch > sh) { ch = sh; cw = sh * ratio; }
  canvas.style.width  = Math.floor(cw) + "px";
  canvas.style.height = Math.floor(ch) + "px";
}

function applyOrientation() {
  // viewport-based detection (not the deprecated orientation API)
  const portrait = window.innerHeight >= window.innerWidth;
  document.body.classList.toggle("portrait", portrait);
  document.body.classList.toggle("landscape", !portrait);
  fitCanvas();
  // canvas internal resolution stays 800x500, so game state is untouched;
  // clamp paddles defensively in case heights changed via effects
  left.y  = Math.max(0, Math.min(H - left.h,  left.y));
  right.y = Math.max(0, Math.min(H - right.h, right.y));
}
addEventListener("resize", applyOrientation);
addEventListener("orientationchange", applyOrientation);

// ---- Best-effort fullscreen (mobile), fails silently ----
const fsBtn = document.getElementById("fsBtn");
fsBtn.addEventListener("click", () => {
  try {
    const el = document.documentElement;
    const inFs = document.fullscreenElement || document.webkitFullscreenElement;
    if (!inFs) {
      (el.requestFullscreen || el.webkitRequestFullscreen || function () {}).call(el);
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen || function () {}).call(document);
    }
  } catch (e) { /* unsupported -> ignore */ }
});

refreshKeyButtons();
refreshGuruSeg();
updateHint();
updateSoundBtn();
applyOrientation();
reset();
requestAnimationFrame(loop);
</script>
</body>
