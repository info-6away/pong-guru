<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pong.guru</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: "Courier New", monospace;
    overflow: hidden;
  }
  #wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  #score {
    font-size: 48px;
    letter-spacing: 8px;
    user-select: none;
  }
  canvas {
    background: #000;
    border: 2px solid #fff;
    image-rendering: pixelated;
  }
  #message {
    font-size: 28px;
    min-height: 34px;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #restart {
    display: none;
    font-family: inherit;
    font-size: 20px;
    color: #000;
    background: #fff;
    border: none;
    padding: 10px 24px;
    cursor: pointer;
    letter-spacing: 2px;
  }
  #restart:hover { background: #ccc; }
  #hint { font-size: 14px; opacity: 0.5; letter-spacing: 2px; }
  #mobile {
    display: none;
    padding: 40px;
    text-align: center;
    font-size: 22px;
    letter-spacing: 2px;
  }
  @media (hover: none) and (pointer: coarse) {
    #wrap { display: none; }
    #mobile { display: block; }
  }
</style>
</head>
<body>
  <div id="wrap">
    <div id="score">0 : 0</div>
    <canvas id="game" width="800" height="500"></canvas>
    <div id="message"></div>
    <button id="restart">Restart</button>
    <div id="hint">P1: W / S &nbsp;&nbsp;&nbsp; P2: O / L</div>
  </div>
  <div id="mobile">KEYBOARD REQUIRED<br><br>Play pong.guru on a device with a keyboard.</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;

const PADDLE_W = 12, PADDLE_H = 90, PADDLE_SPEED = 6;
const BALL_SIZE = 12, WIN_SCORE = 10;

const left  = { x: 20,           y: H / 2 - PADDLE_H / 2 };
const right = { x: W - 20 - PADDLE_W, y: H / 2 - PADDLE_H / 2 };
const ball  = { x: 0, y: 0, vx: 0, vy: 0 };
let scoreL = 0, scoreR = 0;
let running = true;

const keys = {};
addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; });
addEventListener("keyup",   e => { keys[e.key.toLowerCase()] = false; });

// --- Guru Bounce ---
const GURU_SIZE = 44, GURU_HIT = 30, BOOST = 1.4;
const WISDOM = [
  "Inner peace... outer chaos.",
  "The paddle is an illusion.",
  "Breathe in. Smash out.",
  "You missed because you wanted to.",
  "The ball knows.",
  "No ego. Just Pong.",
  "Guru says: skill issue.",
];
const guru = {
  x: 0, y: 0,
  visible: false,
  hit: false,        // true while jumping after a hit
  jumpY: 0,          // upward visual offset (px)
  jumpVel: 0,        // jump velocity
  nextAppear: 0,     // timestamp to next show
  hideAt: 0,         // timestamp to auto-hide
  msg: "",
  msgUntil: 0,       // timestamp message fades out
};
let boostUntil = 0;  // timestamp boost ends (0 = inactive)

function randGuruDelay() { return 10000 + Math.random() * 5000; } // 10-15s

function showGuru(now) {
  guru.visible = true;
  guru.hit = false;
  guru.jumpY = 0;
  guru.jumpVel = 0;
  guru.x = W / 2 + (Math.random() * 120 - 60);
  guru.y = H / 2 + (Math.random() * 120 - 60);
  guru.hideAt = now + 4000; // visible for ~4s if untouched
}

function hideGuru(now) {
  guru.visible = false;
  guru.nextAppear = now + randGuruDelay();
}

function hitGuru(now) {
  guru.hit = true;
  guru.jumpVel = -9;
  guru.msg = WISDOM[Math.floor(Math.random() * WISDOM.length)];
  guru.msgUntil = now + 1500;
  guru.hideAt = now + 900; // hop, then leave
  // Ball changes direction randomly, then speeds up for 3s
  const speed = Math.hypot(ball.vx, ball.vy) || 6;
  const angle = (Math.random() * 1.0 - 0.5) * 0.7;       // gentle vertical spread
  const dir = Math.random() < 0.5 ? -1 : 1;
  ball.vx = Math.cos(angle) * speed * dir;
  ball.vy = Math.sin(angle) * speed;
  if (boostUntil === 0) {                                // apply boost once
    ball.vx *= BOOST; ball.vy *= BOOST;
  }
  boostUntil = now + 3000;
}

const scoreEl   = document.getElementById("score");
const messageEl = document.getElementById("message");
const restartEl = document.getElementById("restart");
restartEl.addEventListener("click", reset);

function resetBall(dir) {
  ball.x = W / 2 - BALL_SIZE / 2;
  ball.y = H / 2 - BALL_SIZE / 2;
  const angle = (Math.random() * 0.5 - 0.25) * Math.PI; // -45..45 deg
  const speed = 6;
  ball.vx = Math.cos(angle) * speed * dir;
  ball.vy = Math.sin(angle) * speed;
}

function reset() {
  scoreL = 0; scoreR = 0;
  running = true;
  messageEl.textContent = "";
  restartEl.style.display = "none";
  left.y = right.y = H / 2 - PADDLE_H / 2;
  resetBall(Math.random() < 0.5 ? -1 : 1);
  guru.visible = false;
  guru.hit = false;
  guru.msgUntil = 0;
  guru.nextAppear = performance.now() + randGuruDelay();
  boostUntil = 0;
  updateScore();
}

function updateScore() {
  scoreEl.textContent = scoreL + " : " + scoreR;
}

function hitsPaddle(p) {
  return ball.x < p.x + PADDLE_W &&
         ball.x + BALL_SIZE > p.x &&
         ball.y < p.y + PADDLE_H &&
         ball.y + BALL_SIZE > p.y;
}

function update(now) {
  if (!running) return;

  // End of speed boost -> return to normal
  if (boostUntil !== 0 && now >= boostUntil) {
    ball.vx /= BOOST; ball.vy /= BOOST;
    boostUntil = 0;
  }

  // Guru appear / hide scheduling (only one event at a time)
  if (!guru.visible && now >= guru.nextAppear) showGuru(now);
  if (guru.visible && now >= guru.hideAt) hideGuru(now);

  // Guru jump animation
  if (guru.hit) {
    guru.jumpVel += 0.6;          // gravity
    guru.jumpY += guru.jumpVel;
    if (guru.jumpY > 0) { guru.jumpY = 0; guru.jumpVel = 0; }
  }

  // Paddle movement
  if (keys["w"]) left.y  -= PADDLE_SPEED;
  if (keys["s"]) left.y  += PADDLE_SPEED;
  if (keys["o"]) right.y -= PADDLE_SPEED;
  if (keys["l"]) right.y += PADDLE_SPEED;
  left.y  = Math.max(0, Math.min(H - PADDLE_H, left.y));
  right.y = Math.max(0, Math.min(H - PADDLE_H, right.y));

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Top / bottom walls
  if (ball.y <= 0) { ball.y = 0; ball.vy *= -1; }
  if (ball.y + BALL_SIZE >= H) { ball.y = H - BALL_SIZE; ball.vy *= -1; }

  // Paddle collisions
  if (ball.vx < 0 && hitsPaddle(left)) {
    ball.x = left.x + PADDLE_W;
    bounce(left);
  } else if (ball.vx > 0 && hitsPaddle(right)) {
    ball.x = right.x - BALL_SIZE;
    bounce(right);
  }

  // Guru collision (only while floating, not already hit)
  if (guru.visible && !guru.hit) {
    const bx = ball.x + BALL_SIZE / 2, by = ball.y + BALL_SIZE / 2;
    if (Math.abs(bx - guru.x) < GURU_HIT && Math.abs(by - guru.y) < GURU_HIT) {
      hitGuru(now);
    }
  }

  // Scoring
  if (ball.x + BALL_SIZE < 0) { scoreR++; afterScore(1); }
  else if (ball.x > W)        { scoreL++; afterScore(-1); }
}

function bounce(p) {
  ball.vx *= -1;
  // Add angle based on where the ball hit the paddle
  const offset = (ball.y + BALL_SIZE / 2) - (p.y + PADDLE_H / 2);
  ball.vy += (offset / (PADDLE_H / 2)) * 3;
  // Slight speedup, capped
  ball.vx *= 1.05;
  ball.vx = Math.max(-12, Math.min(12, ball.vx));
}

function afterScore(dir) {
  updateScore();
  if (scoreL >= WIN_SCORE || scoreR >= WIN_SCORE) {
    running = false;
    messageEl.textContent = (scoreL >= WIN_SCORE ? "Player 1" : "Player 2") + " wins!";
    restartEl.style.display = "block";
  } else {
    resetBall(dir);
  }
}

function draw() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, W, H);

  // Center dashed line
  ctx.fillStyle = "#fff";
  for (let y = 0; y < H; y += 30) ctx.fillRect(W / 2 - 1, y, 2, 16);

  // Paddles
  ctx.fillRect(left.x,  left.y,  PADDLE_W, PADDLE_H);
  ctx.fillRect(right.x, right.y, PADDLE_W, PADDLE_H);

  // Ball (white, or a glowing accent while boosted)
  if (running) {
    ctx.fillStyle = boostUntil !== 0 ? "#ffd23f" : "#fff";
    ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
    ctx.fillStyle = "#fff";
  }

  // Guru
  if (guru.visible) {
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = GURU_SIZE + "px serif";
    ctx.fillText("🧘", guru.x, guru.y + guru.jumpY);
  }

  // Wisdom message above the guru, fading out
  if (guru.msgUntil > performance.now()) {
    const alpha = Math.min(1, (guru.msgUntil - performance.now()) / 1500);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ffd23f";
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.font = "18px 'Courier New', monospace";
    ctx.fillText(guru.msg, guru.x, guru.y - GURU_SIZE / 2 - 8 + guru.jumpY);
    ctx.restore();
  }
}

function loop(now) {
  update(now);
  draw();
  requestAnimationFrame(loop);
}

reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
